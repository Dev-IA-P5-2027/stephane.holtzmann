name: Update Weather Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  update-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r CI_CD/requirements.txt

      - name: Run weather update script
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python CI_CD/update_weather.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CI_CD/README.md
          git diff --cached --quiet || git commit -m "Mise à jour automatique de la météo"
          git push